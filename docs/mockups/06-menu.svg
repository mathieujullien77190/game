  <text x="100" y="328" fill="#1B2559" font-size="16" font-weight="600">À propos</text>
  <text x="100" y="350" fill="#1B2559" opacity="0.4" font-size="13">Version, crédits, licences</text>
  <text x="352" y="344" text-anchor="end" fill="#1B2559" opacity="0.25" font-size="20">›</text>

