  <circle cx="195" cy="700" r="5" fill="#ffffff" stroke="#1B2559" stroke-width="2"/>

  <text x="195" y="754" text-anchor="middle" fill="#1B2559" opacity="0.25" font-size="12" letter-spacing="1">tickwire  ·  v1.0</text>

